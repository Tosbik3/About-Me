<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tosbik</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --border: #e2e2e2;
      --text: #1a1a1a;
      --muted: #999;
      --accent: #f97316;
      --accent2: #fb923c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(249,115,22,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      width: 100%;
      max-width: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .avatar-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(var(--bg), var(--bg)) padding-box,
                  linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
      animation: spin 4s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .username {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .username span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bio {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <img class="avatar" src="1000093966.jpg" alt="avatar" />
    </div>

    <div class="username"><span>tosbik</span></div>

    <div class="bio">text me anytime · he/him</div>

  </div>
</body>
</html>
