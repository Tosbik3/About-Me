<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tosbik</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Desktop background */
  .bg-desktop {
    background: url('/mnt/user-data/uploads/1000093914.png') center/cover no-repeat;
    display: block;
  }

  /* Mobile background */
  .bg-mobile {
    background: url('/mnt/user-data/uploads/1000093915.png') center/cover no-repeat;
    display: none;
  }

  @media (max-width: 600px) {
    .bg-desktop { display: none; }
    .bg-mobile { display: block; }
  }

  .blur-overlay {
    position: fixed;
    inset: 0;
    backdrop-filter: blur(8px) brightness(0.6);
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 16px;
  }

  .profile {
    text-align: center;
    margin-bottom: 8px;
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .username {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: #fff;
    letter-spacing: 3px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .bio {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 300;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 380px;
    margin-top: 8px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 22px;
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
    text-decoration: none;
    color: #fff;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease, background 0.2s ease;
    cursor: pointer;
  }

  .link-card:hover {
    transform: scale(1.06);
    background: rgba(255,255,255,0.15);
    box-shadow: 0 16px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .dc .link-icon { background: rgba(88,101,242,0.35); }
  .yt .link-icon { background: rgba(255,0,0,0.3); }
  .tt .link-icon { background: rgba(0,0,0,0.4); }

  .link-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-platform {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }

  .link-handle {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .arrow {
    margin-left: auto;
    color: rgba(255,255,255,0.4);
    font-size: 1.1rem;
    transition: transform 0.2s ease, color 0.2s ease;
  }

  .link-card:hover .arrow {
    transform: translateX(4px);
    color: rgba(255,255,255,0.8);
  }

  /* Entrance animations */
  .profile { animation: fadeUp 0.6s ease both; }
  .link-card:nth-child(1) { animation: fadeUp 0.6s 0.15s ease both; }
  .link-card:nth-child(2) { animation: fadeUp 0.6s 0.25s ease both; }
  .link-card:nth-child(3) { animation: fadeUp 0.6s 0.35s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

</body>
</html>
